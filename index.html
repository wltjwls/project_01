<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>나만의 독서 아카이브</title>
    <style>
        .error-msg {
            color: red;
            font-size: 13px;
            display: none; /* 처음엔 싹 숨겨두기! */
            margin-left: 10px;
        }
    </style>
</head>
<body>
    <h1>📚 나의 독서 기록장</h1>
    
    <div>
        <label>책 제목: <input type="text" id="book-title"></label>
        <span id="title-error" class="error-msg">책 제목을 입력해 주세요!</span><br><br>
        
        <label>저자: <input type="text" id="book-author"></label>
        <span id="author-error" class="error-msg">저자를 입력해 주세요!</span><br><br>
        
        <label>다 읽은 날짜: <input type="date" id="book-date"></label><br><br>
        
        <label>별점: 
            <select id="book-rating">
                <option value="" selected disabled>별점 선택</option>
                <option value="5">⭐⭐⭐⭐⭐</option>
                <option value="4">⭐⭐⭐⭐</option>
                <option value="3">⭐⭐⭐</option>
                <option value="2">⭐⭐</option>
                <option value="1">⭐</option>
            </select>
        </label>
        <span id="rating-error" class="error-msg">별점을 선택해 주세요!</span><br><br>
        
        <label>읽게 된 계기:<br> 
            <textarea id="book-motive" rows="2" cols="40"></textarea>
        </label><br><br>
        <label>와닿았던 한 줄:<br> 
            <textarea id="book-quote" rows="2" cols="40"></textarea>
        </label><br><br>
        <label>짧은 감상평:<br> 
            <textarea id="book-review" rows="3" cols="40"></textarea>
        </label><br><br>
        
        <button onclick="saveBook()">기록 저장하기</button>
    </div>
    <hr>

    <h2>📖 내 서재</h2>
    <div id="book-list">
        </div>

    <script>
        // 1. 웹페이지가 딱 켜지면 제일 먼저 할 일: 저장된 책 목록 불러오기!
        window.onload = function() {
            loadBooks();
        };

        // 2. 기록 저장하기 버튼을 눌렀을 때 실행되는 함수
        function saveBook() {
            const title = document.getElementById('book-title').value;
            const author = document.getElementById('book-author').value;
            const date = document.getElementById('book-date').value;
            const rating = document.getElementById('book-rating').value;
            const motive = document.getElementById('book-motive').value;
            const quote = document.getElementById('book-quote').value;
            const review = document.getElementById('book-review').value;

            let isValid = true; // 통과 여부를 체크하는 심판!

            // 1. 제목 검사
            if(title === "") {
                document.getElementById('title-error').style.display = 'inline';
                isValid = false;
            } else {
                document.getElementById('title-error').style.display = 'none';
            }

            // 2. 저자 검사
            if(author === "") {
                document.getElementById('author-error').style.display = 'inline';
                isValid = false;
            } else {
                document.getElementById('author-error').style.display = 'none';
            }

            // 3. 별점 검사
            if(rating === "") {
                document.getElementById('rating-error').style.display = 'inline';
                isValid = false;
            } else {
                document.getElementById('rating-error').style.display = 'none';
            }

            // 하나라도 빈칸이 있어서 isValid가 false가 되었다면 여기서 저장 멈춤!
            if(!isValid) {
                return; 
            }

            // 입력된 정보들을 하나의 '객체(Object)' 덩어리로 묶기
            const bookInfo = {
                id: Date.now(), // 삭제할 때 쓸 고유 번호
                title: title,
                author: author,
                date: date,
                rating: rating,
                motive: motive,
                quote: quote,
                review: review
            };

            // 브라우저 창고(localStorage)에서 기존 기록 꺼내오기 (없으면 빈 배열 [])
            let savedBooks = JSON.parse(localStorage.getItem('myLibrary')) || [];
            
            // 기존 기록에 방금 쓴 새 기록 추가하기
            savedBooks.push(bookInfo);

            // 다시 창고(localStorage)에 안전하게 텍스트로 변환해서 집어넣기
            localStorage.setItem('myLibrary', JSON.stringify(savedBooks));

            // 화면에 방금 저장한 것까지 포함해서 다시 예쁘게 그리기
            loadBooks();

            // 다음 입력을 위해 칸 싹 다 비워주기
            document.getElementById('book-title').value = '';
            document.getElementById('book-author').value = '';
            document.getElementById('book-date').value = '';
            document.getElementById('book-rating').value = ''; // 별점도 '별점 선택'으로 리셋!
            document.getElementById('book-motive').value = '';
            document.getElementById('book-quote').value = '';
            document.getElementById('book-review').value = '';
        }

        // 3. 창고에서 기록을 꺼내서 화면에 그려주는 함수
        function loadBooks() {
            const bookList = document.getElementById('book-list');
            bookList.innerHTML = ''; // 화면에 똑같은 게 또 그려지지 않게 일단 빈 도화지로 만듦

            let savedBooks = JSON.parse(localStorage.getItem('myLibrary')) || [];

            // 저장된 책 개수만큼 반복해서 화면에 카드 만들기!
            savedBooks.forEach(function(book) {
                const newRecord = document.createElement('div');
                
                newRecord.innerHTML = `
                    <h3>📘 ${book.title} <small>(${book.author})</small></h3>
                    <p><strong>완독일:</strong> ${book.date} &nbsp;|&nbsp; <strong>별점:</strong> ${book.rating}점</p>
                    <p><strong>💡 읽게 된 계기:</strong> ${book.motive}</p>
                    <p><strong>✨ 와닿았던 한 줄:</strong> ${book.quote}</p>
                    <p><strong>✍️ 감상평:</strong> ${book.review}</p>
                    <button onclick="deleteBook(${book.id})">🗑️ 이 기록 삭제하기</button>
                    <br><hr><br>
                `;
                
                bookList.appendChild(newRecord);
            });
        }

        // 4. 기록 삭제하는 함수
        function deleteBook(idToDelete) {
            let savedBooks = JSON.parse(localStorage.getItem('myLibrary')) || [];
            
            // 삭제하려는 id와 '다른' 애들만 남겨서 새로운 배열을 만듦
            savedBooks = savedBooks.filter(function(book) {
                return book.id !== idToDelete;
            });

            // 왕따시키고 남은 애들만 다시 창고에 저장
            localStorage.setItem('myLibrary', JSON.stringify(savedBooks));

            // 화면 다시 그리기
            loadBooks();
        }
    </script>
</body>
</html>
